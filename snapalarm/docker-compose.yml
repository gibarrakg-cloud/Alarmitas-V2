version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: snapalarm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: snapalarm
      POSTGRES_PASSWORD: snapalarm
      POSTGRES_DB: snapalarm
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U snapalarm']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: snapalarm-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: snapalarm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://snapalarm:snapalarm@postgres:5432/snapalarm
      REDIS_URL: redis://redis:6379
    ports:
      - '8081:8081'
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
